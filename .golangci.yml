# golangci-lint configuration for home_controller project
# Following CLAUDE.md guidelines for Go projects

version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - govet         # Official Go static analyzer
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Static analysis checks
    - unused        # Detect unused code
    - misspell      # Check for common spelling mistakes
    - gosec         # Security issues
    - bodyclose     # Check HTTP response body is closed
    - unconvert     # Remove unnecessary type conversions
    - unparam       # Detect unused function parameters
    - gocritic      # Go critic linter

  exclusions:
    paths:
      - triton/generated
      - config/ttest.go
    presets: []
    rules:
      - linters: [gosec]
        text: "G120"  # Form parsing body size - legacy handlers, low risk internal service

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      exclude-functions:
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteString

    gosec:
      severity: medium
      confidence: medium

    gocritic:
      enabled-checks:
        - appendAssign
        - assignOp
        - captLocal
        - commentedOutCode
        - deprecatedComment
        - dupImport
        - emptyFallthrough
        - emptyStringTest
        - equalFold
        - indexAlloc
        - initClause
        - methodExprCall
        - nilValReturn
        - rangeExprCopy
        - regexpMust
        - sloppyLen
        - stringXbytes
        - typeAssertChain
        - typeSwitchVar
        - underef
        - unlambda
        - unslice

    staticcheck:
      # Exclude style/naming checks (ST1000-ST1020, QF*) as these are widespread
      # pre-existing naming conventions throughout the codebase.
      # SA*, S1* (correctness/simplification) checks remain enabled.
      checks:
        - "all"
        - "-ST1000" # package comment
        - "-ST1001" # dot imports
        - "-ST1003" # naming conventions (underscores, ALL_CAPS, etc.)
        - "-ST1016" # receiver name consistency
        - "-ST1020" # exported function comment style
        - "-QF1001" # De Morgan's law
        - "-QF1003" # tagged switch

    govet:
      enable-all: true
      settings:
        shadow:
          strict: false  # too many pre-existing shadows in the codebase

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

